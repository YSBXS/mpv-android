name: build

on:
  workflow_dispatch:
  push:
    branches:
      - fongmi
  pull_request:
    branches:
      - fongmi

env:
  MPV_GIT_URL: https://github.com/FongMi/mpv
  MPV_GIT_REF: fongmi
  MPV_ANDROID_ARCHES: armv7l arm64

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - name: Export env vars
        run: buildscripts/include/ci.sh export >> $GITHUB_ENV

      - uses: actions/cache@v5
        with:
          path: gh-cache/
          key: "${{ env.CACHE_IDENTIFIER }}"
          enableCrossOsArchive: true

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install autoconf pkgconf libtool ninja-build python3-pip gperf
          sudo pip3 install meson

      - name: Download or build deps
        run: |
          mkdir -p "$CACHE_FOLDER"
          buildscripts/include/ci.sh install
        env:
          CACHE_MODE: "folder"
          CACHE_FOLDER: "${{ github.workspace }}/gh-cache"

      - name: Build mpv
        run: buildscripts/include/ci.sh build

      # 关键修复：先 clean + 强制 library 模式 + 关闭签名 + 只打 aar
      - name: Build AAR (no APK, no signature)
        run: |
          ./gradlew clean
          # 临时修改 app 模块为 library，移除 applicationId，关闭签名
          sed -i 's/id.\+application/id "com.android.library"/' app/build.gradle
          sed -i '/applicationId/d' app/build.gradle
          # 构建 release aar，跳过签名
          ./gradlew :app:assembleRelease -Pandroid.injected.signing.store.file= -Pandroid.injected.signing.store.password= -Pandroid.injected.signing.key.alias= -Pandroid.injected.signing.key.password=

      - uses: actions/upload-artifact@v7
        with:
          name: mpv-android-fongmi-aar
          path: app/build/outputs/aar/app-release.aar
